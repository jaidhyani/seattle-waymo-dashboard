name: Weekly Data Update

on:
  schedule:
    # Every Monday at 9am ET (14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Update fatality data
        run: node scripts/update-fatalities.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data/fatalities.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/fatalities.json
          git commit -m "chore: auto-update Seattle fatality data"
          git push
